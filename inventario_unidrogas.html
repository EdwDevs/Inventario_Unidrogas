            const formatCOP = (val) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val);

            const getGroupComparison = (group) => {
                const uItemKey = group.items.find(k => k.startsWith('u-'));
                const dItemKey = group.items.find(k => k.startsWith('d-'));
                const cItemKey = group.items.find(k => k.startsWith('c-'));

                const u = uItemKey ? productsUnidrogas.find(p => p.id === uItemKey.split('-')[1]) : null;
                const d = dItemKey ? productsDrosan.find(p => p.id === dItemKey.split('-')[1]) : null;
                const c = cItemKey ? productsCopidrogas.find(p => p.id === cItemKey.split('-')[1]) : null;

                const priceU = u ? (u.hasDiscount ? u.price * (1 - UNIDROGAS_DISCOUNT_RATE) : u.price) : Infinity;
                const priceD = d ? d.finalPrice : Infinity;
                const priceCForComparison = c ? (c.stock > 0 ? c.finalPrice : Infinity) : Infinity;
                const priceCDisplay = c ? c.finalPrice : null;

                let matchCount = 0;
                if (u) matchCount++;
                if (d) matchCount++;
                if (c) matchCount++;

                let rowColor = "bg-white";
                let badgeText = "";
                let badgeColor = "";

                if (matchCount === 3) {
                    rowColor = "bg-blue-50 hover:bg-blue-100";
                    badgeText = "Total";
                    badgeColor = "bg-blue-200 text-blue-800";
                } else if (matchCount === 2) {
                    rowColor = "bg-green-50 hover:bg-green-100";
                    badgeText = "Parcial";
                    badgeColor = "bg-green-200 text-green-800";
                } else {
                    rowColor = "bg-orange-50 hover:bg-orange-100";
                    badgeText = "Única";
                    badgeColor = "bg-orange-200 text-orange-800";
                }

                const min = Math.min(priceU, priceD, priceCForComparison);
                let winner = "---";
                if (min !== Infinity) {
                    if (min === priceU) winner = "Unidrogas";
                    else if (min === priceD) winner = "Drosan";
                    else winner = "Copidrogas";
                }

                const displayName = u?.name || d?.name || c?.name || "Sin nombre";

                return {
                    id: group.id,
                    displayName,
                    badgeText,
                    badgeColor,
                    rowColor,
                    winner,
                    u,
                    d,
                    c,
                    priceU,
                    priceD,
                    priceCForComparison,
                    priceCDisplay,
                };
            };

            const comparisonGroups = useMemo(
                () => manualGroups.map(group => getGroupComparison(group)),
                [manualGroups]

                const list = [];

                                                        <span>Drosan</span>
                                                        {isDrosanWinner && (
                                                            <span className="ml-auto rounded-full bg-emerald-600 px-2 py-0.5 text-[9px] font-bold text-white">Mejor opción</span>
                                                        )}
                                                    </div>
                                                    {group.d ? (
                                                        <div className="mt-1 font-bold">{formatCOP(group.priceD)}</div>
                                                    ) : (
                                                        <span className="text-gray-400 text-xs italic">No disp.</span>
                                                    )}
                                                </div>

                                                    <div className="flex items-center gap-2 text-[10px] font-bold uppercase text-indigo-600">
                                                        <span>Copidrogas</span>
                                                        {isCopidrogasWinner && (

                                                        )}
                                                    </div>
                                                    {group.c ? (
                                                        <div className="mt-1">
                                                            {group.c.stock > 0 ? (

                                                                    <div className="font-bold">{formatCOP(group.priceCDisplay)}</div>

                                                        <span className="text-gray-400 text-xs italic">No disp.</span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}

            }

            // --- VISTA CATÁLOGO NORMAL (Código existente pero con navegación a grouping) ---
            const currentProducts = supplier === 'Unidrogas' ? productsUnidrogas : supplier === 'Drosan' ? productsDrosan : productsCopidrogas;
            
            const addToCart = (id) => setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
            const removeFromCart = (id) => setCart(prev => { const n = { ...prev }; if (n[id] > 1) n[id]--; else delete n[id]; return n; });
            const clearCurrentViewCart = () => {
                openConfirmModal(`¿Limpiar carrito de ${supplier}?`, () => {
                    setCart(prev => {
                        const n = { ...prev };
                        currentProducts.forEach(p => delete n[p.id]);
                        return n;
                    });
                    setToastMessage('Carrito limpiado');
                });
            };
            const clearAllCache = () => {
                openConfirmModal("¿Borrar TODO?", () => {
                    setCart({});
                    setManualGroups([]);
                    localStorage.removeItem('pharmaCart_v4');
                    localStorage.removeItem('pharmaGroups_v1');
                    if (Object.keys(cart).length > 0) {
                        setToastMessage('Carrito limpiado');
                    } else if (manualGroups.length > 0) {
                        setToastMessage('Grupo limpiado');
                    }
                });
            };
            
            // Cálculos para el carrito lateral
            let subtotal = 0, savings = 0, total = 0, count = 0;
            const cartLineItems = [];
            Object.entries(cart).forEach(([id, qty]) => {
                const p = currentProducts.find(x => x.id === id);
                if (p) {
                    const price = p.price * qty;
                    let unitPrice = p.price;
                    if (supplier === 'Unidrogas') unitPrice = p.hasDiscount ? p.price * (1 - UNIDROGAS_DISCOUNT_RATE) : p.price;
                    else unitPrice = p.finalPrice; // Drosan y Copi usan finalPrice
                    const lineTotal = unitPrice * qty;
                    
                    subtotal += price;
                    savings += (price - lineTotal);
                    total += lineTotal;
                    count += qty;
                    cartLineItems.push({ name: p.name, qty, unitPrice, lineTotal });
                }
            });

            const orderedCartItems = [...cartLineItems].sort((a, b) => a.name.localeCompare(b.name, 'es', { sensitivity: 'base' }));
            const buildWhatsAppMessage = ({ supplier, items, subtotal, savings, total }) => {
                const lines = [
                    `🧾 *Cotización - ${supplier}*`,
                    '━━━━━━━━━━━━━━━━━━',
                    ...items.flatMap((item, idx) => ([
                        `${idx + 1}. ${item.name}`,
                        `   • Cant: ${item.qty}`,
                        `   • Unit: ${formatCOP(item.unitPrice)}`,
                        `   • Total: ${formatCOP(item.lineTotal)}`,
                        ''
                    ])),
                    '━━━━━━━━━━━━━━━━━━',
                    `Subtotal: ${formatCOP(subtotal)}`,
                    `Ahorro: ${formatCOP(savings)}`,
                    `Total: ${formatCOP(total)}`,
                    '',
                    '📌 *Nota:* Valores sujetos a disponibilidad.'
                ];
                return lines.join('\n');
            };
            const message = buildWhatsAppMessage({ supplier, items: orderedCartItems, subtotal, savings, total });
            const whatsappUrl = "https://wa.me/?text=" + encodeURIComponent(message);

            const theme = supplier === 'Unidrogas' ? 'blue' : supplier === 'Drosan' ? 'emerald' : 'indigo';
            const themeClass = `text-${theme}-600 bg-${theme}-50 border-${theme}-200`;
            const cartContents = (showClose = false) => (
                <>
                    <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-slate-50">
                        <div>
                            <h2 className="font-bold flex items-center gap-2">{Icons.Cart} Resumen de cotización</h2>
                            <p className="text-xs text-gray-500">Proveedor: {supplier}</p>
                        </div>
                        <div className="flex items-center gap-2">
                            {showClose && (
                                <button onClick={() => setIsCartOpen(false)} className="text-gray-500 hover:text-gray-700 transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
                                    {Icons.X}
                                </button>
                            )}
                        </div>
                    </div>
                    <div className="flex-grow overflow-y-auto p-4 space-y-3">
                        {count === 0 ? (
                            <div className="text-center text-gray-400 py-10">
                                <div className="mx-auto w-10 h-10 mb-2 opacity-50">{Icons.DollarSign}</div>
                                <p className="text-sm">Carrito vacío</p>
                                <p className="text-xs mt-2 text-gray-500">Usa el catálogo para encontrar y agregar productos al pedido.</p>
                                <button
                                    type="button"
                                    onClick={() => {
                                        setView('catalog');
                                        setIsCartOpen(false);
                                        requestAnimationFrame(() => searchInputRef.current?.focus());
                                    }}
                                    className="mt-4 inline-flex items-center justify-center rounded-full border border-gray-100 px-4 py-2 text-xs font-semibold text-gray-700 transition-all duration-200 ease-out hover:border-gray-200 hover:text-gray-900 active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
                                >
                                    Ver productos
                                </button>
                            </div>
                        ) : (
                            Object.entries(cart).map(([id, qty]) => {
                                const p = currentProducts.find(x => x.id === id);
                                if (!p) return null;
                                let final = supplier === 'Unidrogas' ? (p.hasDiscount ? p.price * (1 - UNIDROGAS_DISCOUNT_RATE) : p.price) : p.finalPrice;
                                return (
                                    <div key={id} className="text-sm border-b border-gray-100 pb-2">
                                        <div className="flex justify-between font-bold">
                                            <span className="truncate w-40">{p.name}</span>
                                            <span>x{qty}</span>
                                        </div>
                                        <div className="flex justify-between text-xs text-gray-500 mt-1">
                                            <span>Unit: {formatCOP(final)}</span>
                                            <span className="font-bold text-gray-800">{formatCOP(final * qty)}</span>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                    <div className="p-4 bg-white border-t border-gray-100">
                        <div className="rounded-lg bg-slate-50 p-3">
                            <div className="flex justify-between text-sm mb-2">
                                <span>Subtotal</span>
                                <span>{formatCOP(subtotal)}</span>
                            </div>
                            {savings > 0 && (
                                <div className="flex justify-between text-sm text-green-600 font-bold mb-2">
                                    <span>Ahorro</span>
                                    <span>- {formatCOP(savings)}</span>
                                </div>
                            )}
                            <div className="flex justify-between text-xl font-bold border-t border-gray-100 pt-2 mt-2">
                                <span>Total</span>
                                <span>{formatCOP(total)}</span>
                            </div>
                        </div>
                        {count > 0 && (
                            <button
                                type="button"
                                onClick={() => window.open(whatsappUrl, "_blank")}
                                className="w-full mt-4 py-3 rounded font-bold text-white shadow-md transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300 bg-emerald-600 hover:bg-emerald-700 flex items-center justify-center gap-2"
                            >
                                💬 Confirmar Pedido
                            </button>
                            <>
                                <button
                                    type="button"
                                    onClick={() => window.open(whatsappUrl, "_blank")}
                                    className="w-full mt-4 inline-flex items-center justify-center gap-2 py-3 rounded font-bold text-white shadow-sm transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-green-400 bg-green-600 hover:bg-green-700"
                                >
                                    {Icons.Check}
                                    Enviar cotización WhatsApp
                                </button>
                                <button
                                    type="button"
                                    onClick={clearCurrentViewCart}
                                    className="w-full mt-2 inline-flex items-center justify-center gap-2 py-2 text-xs font-semibold text-gray-500 hover:text-gray-700 transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-300"
                                >
                                    {Icons.Trash}
                                    Limpiar carrito
                                </button>
                            </>
                        )}
                    </div>
                </>
            );

            return (
                <div className="flex flex-col h-full bg-gray-50 font-sans">
                    <header className="sticky top-0 z-10 backdrop-blur bg-white/80 border-b p-4 flex flex-wrap justify-between items-center gap-4">
                <div className="flex flex-col h-full bg-slate-50 font-sans">
                    <header className="bg-white shadow-sm border-b border-gray-100 p-4 flex flex-wrap justify-between items-center gap-4 z-10">
                        <div className="flex items-center gap-2">
                            <div className={`p-2 rounded text-white bg-${theme}-600`}>{Icons.Store}</div>
                            <div>
                                <h1 className="text-base sm:text-lg lg:text-xl font-bold text-primary">Catálogo {supplier}</h1>
                                <p className="text-xs sm:text-sm text-gray-500">Vista individual por depósito</p>
                            </div>
                        </div>
                        <div className="flex flex-wrap items-center gap-4">
                            <TabBar />
                            <button onClick={() => {
                                let next = supplier === 'Unidrogas' ? 'Drosan' : supplier === 'Drosan' ? 'Copidrogas' : 'Unidrogas';
                                setSupplier(next);
                            }} className="px-4 py-2 border border-gray-100 rounded text-xs sm:text-sm hover:bg-slate-50 flex items-center gap-2 transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
                                {Icons.Refresh} Cambiar Depósito
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow flex overflow-hidden">
                        {/* Lista productos normal */}
                        <div className="flex-grow overflow-y-auto">
                            <div className="sticky top-0 z-10 bg-slate-50/80 backdrop-blur px-4 pt-4 pb-2">
                                <div className="relative">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{Icons.Search}</div>
                                    <input type="text" placeholder="Buscar..." className="w-full pl-10 pr-4 text-xs py-1.5 border rounded outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm sm:py-2" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} ref={searchInputRef} />
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 px-4 pb-4">
                                {currentProducts.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase())).map(p => {
                                    let price = p.price;
                                    let final = supplier === 'Unidrogas' ? (p.hasDiscount ? price * (1 - UNIDROGAS_DISCOUNT_RATE) : price) : p.finalPrice;
                                    let stock = supplier === 'Copidrogas' ? p.stock : 999;
                                    const isOutOfStock = supplier === 'Copidrogas' && stock <= 0;
                                    const stockLabel = supplier === 'Copidrogas' ? (stock > 0 ? `Stock: ${stock}` : 'Agotado') : 'Disponible';
                                    const qty = cart[p.id] || 0;

                                    const savings = price - final;
                                    const hasSavings = savings > 0;

                                    return (
                                        <div key={p.id} className="relative bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between space-y-2">
                                            <span className={`absolute top-3 right-3 inline-flex items-center rounded-full px-2 py-1 text-[11px] font-semibold ${isOutOfStock ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                                                {stockLabel}
                                            </span>
                                            <div className="space-y-2">
                                                <div className="flex items-start gap-2">
                                                    <span className="text-[10px] bg-gray-100 text-gray-600 px-2 py-1 rounded font-bold">{p.category || 'GENERAL'}</span>
                                                    {qty > 0 && <span className={`text-xs font-bold px-2 py-1 rounded-full text-white bg-${theme}-600`}>x{qty}</span>}
                                                </div>
                                                <div className="font-bold text-base sm:text-lg lg:text-xl h-10 line-clamp-2">{p.name}</div>
                                            </div>
                                            
                                            <div className="border-t pt-3 flex flex-col gap-3">
                                                <div className="space-y-2">
                                                    {hasSavings && (
                                                        <span className="inline-flex items-center w-fit rounded-full bg-emerald-50 text-emerald-700 text-[11px] font-semibold px-2 py-1">
                                                            Ahorro {formatCOP(savings)}
                                                        </span>
                                                    )}
                                                    <div className="text-xs text-gray-400 line-through">{formatCOP(price)}</div>
                                                    <div className={`text-lg font-bold text-${theme}-700`}>{formatCOP(final)}</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    {qty > 0 && <button onClick={() => removeFromCart(p.id)} className="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center hover:bg-slate-50 transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400">-</button>}
                                                    <button 
                                                        onClick={() => addToCart(p.id)} 
                                                        disabled={supplier === 'Copidrogas' && stock <= 0}
                                                        className={`px-4 py-1 rounded text-white text-xs sm:text-sm font-bold transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-${theme}-400 ${supplier === 'Copidrogas' && stock <= 0 ? 'bg-gray-400' : `bg-${theme}-600 hover:bg-${theme}-700`}`}
                                                    >
                                                        {qty === 0 ? 'AGREGAR' : '+'}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Carrito Lateral */}
                        <div className="hidden lg:flex w-80 bg-white border-l border-gray-100 flex-col shadow-md z-20">
                            {cartContents()}
                        </div>
                    </main>

                    <button
                        onClick={() => setIsCartOpen(true)}
                        className={`lg:hidden fixed bottom-5 right-5 z-30 flex items-center gap-2 rounded-full px-4 py-3 text-white shadow-md bg-${theme}-600 hover:bg-${theme}-700 transition-all duration-200 ease-out active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-${theme}-300`}
                    >
                        {Icons.Cart}
                        <span className="font-semibold">Carrito</span>
                        {count > 0 && (
                            <span className="ml-1 rounded-full bg-white/20 px-2 text-xs font-bold">
                                {count}
                            </span>
                        )}
                    </button>

                    <div className={`fixed inset-0 z-40 lg:hidden ${isCartOpen ? '' : 'pointer-events-none'}`}>
                        <div
                            onClick={() => setIsCartOpen(false)}
                            className={`absolute inset-0 bg-black/40 transition-opacity ${isCartOpen ? 'opacity-100' : 'opacity-0'}`}
                        ></div>
                        <div
                            onClick={(event) => event.stopPropagation()}
                            className={`absolute inset-x-0 bottom-0 bg-white rounded-t-2xl shadow-md transform transition-transform ${isCartOpen ? 'translate-y-0' : 'translate-y-full'}`}
                        >
                            <div className="max-h-[80vh] flex flex-col">
                                {cartContents(true)}
                            </div>
                        </div>
                    </div>
                    {overlays}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
